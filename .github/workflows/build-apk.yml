name: Build Android APK (TWA)

# Génère un APK signé via Bubblewrap à chaque push sur main, et publie
# une GitHub Release téléchargeable directement depuis le site CloneX.

on:
  push:
    branches: [main]
    paths:
      - 'twa-manifest.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch: {} # lancement manuel

permissions:
  contents: write # pour créer/uploader les releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android cmdline-tools + build-tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"

      # Bubblewrap stocke ses reglages dans ~/.llama/llama-config.json.
      # On le pre-remplit pour dire : utilise le JDK et SDK deja installes,
      # evite la question interactive "Do you want Bubblewrap to install the JDK?".
      - name: Pre-configure Bubblewrap (skip interactive JDK prompt)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          cat ~/.bubblewrap/config.json

      # Keystore STABLE stocke en secret GitHub (APK_KEYSTORE_B64) pour que
      # le fingerprint SHA-256 reste constant entre les builds. Ce fingerprint
      # doit matcher celui publie dans assetlinks.json sur le host domain
      # (https://land-lang-120.github.io/.well-known/assetlinks.json) pour
      # que la TWA Android fonctionne en mode fullscreen (sans URL bar).
      - name: Restore stable keystore from secret
        env:
          APK_KEYSTORE_B64: ${{ secrets.APK_KEYSTORE_B64 }}
        run: |
          echo "$APK_KEYSTORE_B64" | base64 -d > android.keystore
          keytool -list -v -keystore android.keystore -alias android -storepass '${{ secrets.KEYSTORE_PASSWORD }}' | grep -E "SHA256|SHA 256" || true

      # Init bubblewrap en non-interactif : on place notre twa-manifest dans le
      # dossier de travail ET on lance la generation du projet Android
      - name: Prepare TWA directory
        run: |
          mkdir -p twa
          cp twa-manifest.json twa/twa-manifest.json
          cp android.keystore twa/android.keystore

      - name: Bubblewrap update (generate Android project from manifest)
        working-directory: twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'chromemessenger2026' }}
        run: |
          bubblewrap update --skipVersionUpgrade || bubblewrap init \
            --manifest "https://land-lang-120.github.io/chrome-messenger/manifest.json" \
            --directory . \
            --chromeosonly false || true

      - name: Build APK + AAB
        working-directory: twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'chromemessenger2026' }}
          # Bubblewrap lit ces deux variables pour eviter les prompts interactifs
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'chromemessenger2026' }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'chromemessenger2026' }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath ./android.keystore \
            --signingKeyAlias android

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp twa/app-release-signed.apk release/chrome-messenger.apk || true
          cp twa/app-release-bundle.aab release/chrome-messenger.aab || true
          ls -la release/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-messenger-apk
          path: release/

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.0.0
          name: Chrome Messenger APK v1.0.0
          body: |
            📱 **APK Android signé prêt à installer**

            Télécharge `chrome-messenger.apk` ci-dessous, puis :
            1. Active "Sources inconnues" dans les paramètres Android
            2. Ouvre le fichier `.apk` et installe

            💎 Pour le Play Store : utilise `chrome-messenger.aab`

            Tous les messages restent chiffrés end-to-end (ECDH P-256 + AES-GCM).
          files: |
            release/chrome-messenger.apk
            release/chrome-messenger.aab
          make_latest: true
