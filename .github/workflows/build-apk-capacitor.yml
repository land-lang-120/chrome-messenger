name: Build Native APK (Capacitor)

# Genere une VRAIE APK native Android via Capacitor (WebView embarque).
# Contrairement a la TWA, l'APK ne depend plus de Chrome installe sur le
# telephone : elle embarque son propre moteur WebView Chromium et tout
# le bundle web en local.

on:
  push:
    branches: [main]
    paths:
      - 'capacitor.config.ts'
      - 'android/**'
      - '.github/workflows/build-apk-capacitor.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web bundle (Capacitor target, base './')
        env:
          VITE_APP_ENV: prod
          VITE_BUILD_TARGET: capacitor
        run: npx vite build

      - name: Capacitor sync (copy web assets into android/app/src/main/assets/)
        run: npx cap sync android

      - name: Restore stable keystore from secret
        env:
          APK_KEYSTORE_B64: ${{ secrets.APK_KEYSTORE_B64 }}
        run: |
          echo "$APK_KEYSTORE_B64" | base64 -d > android/app/android.keystore
          echo "Keystore restore OK"

      - name: Build signed APK with Gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        working-directory: android
        run: |
          cat >> gradle.properties <<EOF
          CM_STORE_FILE=android.keystore
          CM_STORE_PASSWORD=${KEYSTORE_PASSWORD}
          CM_KEY_ALIAS=android
          CM_KEY_PASSWORD=${KEYSTORE_PASSWORD}
          EOF
          ./gradlew assembleRelease --stacktrace

      - name: Find and rename APK
        run: |
          mkdir -p release
          find android/app/build/outputs/apk -name "*.apk" -exec cp {} release/chrome-messenger-native.apk \;
          ls -la release/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-messenger-capacitor-apk
          path: release/

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-native-v1.0.0
          name: Chrome Messenger Native APK (Capacitor) v1.0.0
          body: |
            📱 **Vraie APK native Android via Capacitor**

            Cette version n'est plus une TWA (qui utilisait Chrome Custom Tabs).
            C'est une vraie application native avec WebView Chromium embarque.

            ✅ Ne depend plus de Chrome installe sur le telephone
            ✅ Fonctionne 100% offline (assets bundle dans l'APK)
            ✅ Plus de barre URL / header Chrome
            ✅ Acces natif aux API Android (futur : contacts, fichiers, notifs)

            Taille : ~10-15 MB (vs 1.3 MB pour la TWA).
          files: release/chrome-messenger-native.apk
          make_latest: true
