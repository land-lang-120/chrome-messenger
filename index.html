<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#30D79C" />

  <!--
    SECURITE : Content Security Policy stricte.
    - default-src 'self' : tout par defaut depuis ce domaine
    - script-src : + gstatic (Firebase SDK)
    - style-src : + fonts.googleapis.com (Manrope) + inline pour styles dynamiques
    - connect-src : Firebase endpoints + WebSockets Firestore
    - frame-ancestors 'none' : anti-clickjacking
    - object-src 'none' : interdit <object>, <embed>
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.gstatic.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com data:;
    img-src 'self' data: blob: https://firebasestorage.googleapis.com https://*.googleapis.com;
    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://firestore.googleapis.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com;
    frame-ancestors 'none';
    form-action 'none';
    base-uri 'self';
    object-src 'none';
    upgrade-insecure-requests;
  " />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Chrome Messenger — Une messagerie qui change de couleur comme tu changes d'humeur. Chats chiffres bout en bout, todolist, jeux et statuts." />

  <title>Chrome Messenger</title>

  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Manrope (police officielle) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Splash avant React monte -->
  <div id="cm-splash">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
    <div class="title">Chrome Messenger</div>
  </div>

  <!-- Racine React -->
  <div id="root"></div>

  <!-- Point d'entree TypeScript (Vite resout automatiquement) -->
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
