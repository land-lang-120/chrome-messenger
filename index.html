<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#30D79C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Chrome Messenger — Une messagerie qui change de couleur comme tu changes d'humeur. Chats chiffres bout en bout, todolist, jeux et statuts.">
  <title>Chrome Messenger</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>
  <!-- Splash screen (visible before React) -->
  <div id="cm-splash">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
    <div class="logo-wrap">
      <img src="icons/logo.png" alt="Chrome Messenger" width="86" height="86" style="object-fit:contain;display:block"/>
    </div>
    <div class="title">Chrome</div>
    <div class="dots"><div class="d"></div><div class="d"></div><div class="d"></div></div>
  </div>

  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>

  <!-- App bundle -->
  <script src="bundle.js?v=1"></script>

  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('cm-splash');
        if (s) {
          s.classList.add('hide');
          setTimeout(function(){ if (s.parentNode) s.parentNode.removeChild(s); }, 500);
        }
      }, 1400);
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
